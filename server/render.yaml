services:
  - type: web
    name: crm-practice-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: CORS_ORIGIN
        value: https://automation-crm.netlify.app,http://localhost:5173
      - key: LOGIN_RATE_LIMIT_MAX
        value: "8"
      - key: RESET_RATE_LIMIT_MAX
        value: "10"
